<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 6800 800" width="100%" style="display: block; margin: auto;">
    <!-- 
      LOGOTYPE PROPRIÉTAIRE : OZARUKAI
      Concept : Cyber-Zen Gorille
      Grille Globale : 6800x800 | Graisse : 220 | Stencil cuts : 40px
    -->
    
    <g fill="#00D1FF">
